<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Pong - 2D Tennis Spill</title>
    <style>
        * {
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .info {
            margin: 5px 0 10px 0;
            text-align: center;
            font-size: 12px;
            opacity: 0.9;
        }

        canvas {
            border: 3px solid white;
            background: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: none;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .score-container {
            margin-top: 10px;
            display: flex;
            gap: 40px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .player {
            min-width: 120px;
        }

        .player.player1 {
            color: #ff6b6b;
        }

        .player.player2 {
            color: #4ecdc4;
        }

        .winner {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.7; }
        }

        .controls {
            margin-top: 10px;
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            body {
                padding: 5px;
            }

            h1 {
                font-size: 18px;
            }

            .info {
                font-size: 11px;
            }

            .score-container {
                gap: 30px;
                font-size: 18px;
                margin-top: 5px;
            }

            .player {
                min-width: 100px;
            }

            .controls {
                font-size: 10px;
                margin-top: 5px;
            }

            canvas {
                border: 2px solid white;
            }
        }
    </style>
</head>
<body>
    <h1>🎾 PONG 🎾</h1>
    <div class="info">
        <p>PC: Mus + venstreklikk | Mobil: Berør skjermen</p>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="score-container">
        <div class="player player1">
            <div>Spiller 1</div>
            <div id="score1">0</div>
        </div>
        <div class="player player2">
            <div>Spiller 2</div>
            <div id="score2">0</div>
        </div>
    </div>

    <div id="winner"></div>

    <div class="controls">
        <p><strong>PC:</strong> Mus opp/ned + klikk for serve | Piler + venstrepil for serve</p>
        <p><strong>Mobil:</strong> Berør venstre side (Spiller 1) eller høyre side (Spiller 2) for å bevege racketen</p>
        <p><strong>Mål:</strong> Først til 10 poeng vinner!</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
