<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - 2D Tennis Spill</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .info {
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
        }

        canvas {
            border: 3px solid white;
            background: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .score-container {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .player {
            min-width: 150px;
        }

        .player.player1 {
            color: #ff6b6b;
        }

        .player.player2 {
            color: #4ecdc4;
        }

        .winner {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.7; }
        }

        .controls {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>🎾 PONG - Tennis fra Øverst 🎾</h1>
    <div class="info">
        <p>Klikk på leke-området for å fokusere, så er du klar til å spille!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="score-container">
        <div class="player player1">
            <div>Spiller 1 (Mus)</div>
            <div id="score1">0</div>
        </div>
        <div class="player player2">
            <div>Spiller 2 (Piltaster)</div>
            <div id="score2">0</div>
        </div>
    </div>

    <div id="winner"></div>

    <div class="controls">
        <p><strong>Spiller 1 (Venstre):</strong> Beveg musen opp/ned, venstreklikk for å serve</p>
        <p><strong>Spiller 2 (Høyre):</strong> Pil opp/ned, venstrepil for å serve</p>
        <p><strong>Mål:</strong> Først til 10 poeng vinner!</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
